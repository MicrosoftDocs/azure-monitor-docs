### YamlMime:Landing

title: Azure Chaos Studio documentation
summary: Azure Chaos Studio is a managed resilience testing service for Azure. Create a Workspace to discover your resources, run Scenarios that simulate real outage patterns, and get Scenario reports you can use for compliance, retrospectives, and stakeholder communication. You can also build custom chaos experiments for targeted fault injection.

metadata:
  title: Azure Chaos Studio documentation
  description: Learn how to use Azure Chaos Studio Workspaces and Scenarios to validate the resilience of your Azure applications against real outage patterns.
  ms.topic: landing-page
  ms.date: 06/10/2026

