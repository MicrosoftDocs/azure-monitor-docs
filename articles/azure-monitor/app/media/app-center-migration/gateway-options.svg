<text x="760" y="185" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">Telemetry gateway (choose one)</text>
<text x="760" y="205" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A1A1A">Holds Azure Monitor credentials</text>
<rect x="30" y="315" width="380" height="260" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="3" /><rect x="30" y="315" width="380" height="56" rx="18" ry="18" fill="#E8F3FC" stroke="#0078D4" stroke-width="3" /><line x1="30" y1="371" x2="410" y2="371" stroke="#0078D4" stroke-width="3" /><text x="220.0" y="350.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Mobile apps</text><text x="48" y="401" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Community OpenTelemetry SDKs</text><text x="48" y="425" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Export OTLP to your gateway endpoint</text><text x="48" y="449" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• No Azure Monitor credentials in the app</text>
<rect x="475" y="250" width="570" height="210" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="3" /><rect x="475" y="250" width="570" height="56" rx="18" ry="18" fill="#E8F3FC" stroke="#0078D4" stroke-width="3" /><line x1="475" y1="306" x2="1045" y2="306" stroke="#0078D4" stroke-width="3" /><text x="760.0" y="285.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Option A: OTel Collector</text><text x="493" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Telemetry pipeline (signals-aware)</text><text x="493" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Reliability: batch + retry/queue</text><text x="493" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Process telemetry: sample, enrich, redact</text>
<rect x="475" y="490" width="570" height="210" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="3" /><rect x="475" y="490" width="570" height="56" rx="18" ry="18" fill="#E8F3FC" stroke="#0078D4" stroke-width="3" /><line x1="475" y1="546" x2="1045" y2="546" stroke="#0078D4" stroke-width="3" /><text x="760.0" y="525.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Option B: APIM proxy</text><text x="493" y="576" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• API proxy + policies</text><text x="493" y="600" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Routing/throttling/header injection</text><text x="493" y="624" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Simpler ops; limited telemetry processing</text>
<rect x="1150" y="335" width="420" height="220" rx="18" ry="18" fill="#FFFFFF" stroke="#0078D4" stroke-width="3" /><rect x="1150" y="335" width="420" height="56" rx="18" ry="18" fill="#E8F3FC" stroke="#0078D4" stroke-width="3" /><line x1="1150" y1="391" x2="1570" y2="391" stroke="#0078D4" stroke-width="3" /><text x="1360.0" y="370.0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1A1A">Azure Monitor</text><text x="1168" y="421" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Ingestion endpoint(s)</text><text x="1168" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Credentials required</text><text x="1168" y="469" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4D4D4D">• Azure Monitor experiences</text>
