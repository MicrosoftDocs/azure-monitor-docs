title: Azure Monitor pipeline FAQ
summary: |
  Frequently asked questions for Azure Monitor pipeline, including architecture, deployment, data collection, and configuration.

sections:
  - name: Overview & Concepts
    questions:
      - question: What is Azure Monitor pipeline?
        answer: |
          Azure Monitor pipeline extends enterprise-grade telemetry collection to any environment, providing a **single point of control** to securely ingest data, optimize data before ingestion, optimize costs, and ensure consistent delivery to the cloud.

          It runs on Azure Arc–enabled Kubernetes clusters and uses open-source technologies from the **OpenTelemetry ecosystem**, enabling portability and interoperability across environments.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview)

      - question: When should I use Azure Monitor pipeline?
        answer: |
          Azure Monitor pipeline is designed for scenarios where telemetry originates outside Azure, where data volume is high, or where connectivity to Azure may be intermittent or restricted. In these cases, the pipeline allows data to be processed locally before being sent to Azure Monitor.

          | Customer challenge | How Azure Monitor pipeline helps |
          |:---|:---|
          | Telemetry generated outside Azure | Enables centralized ingestion into Azure Monitor from on‑premises and multicloud environments |
          | Very high telemetry volume | Collects and processes data locally at scale before cloud ingestion |
          | Intermittent or restricted connectivity | Buffers data locally in configured persistent storage and backfills to Azure Monitor once connectivity is restored |
          | Bandwidth or ingestion cost constraints | Filters and aggregates telemetry before sending data to Azure Monitor |
          | Data formatting | Auto-schematizes Syslog and CEF data for easier analysis in Azure Monitor |

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#why-use-azure-monitor-pipeline)

      - question: How is Azure Monitor pipeline different from Azure Monitor agent (AMA)?
        answer: |
          Azure Monitor pipeline and Azure Monitor Agent (AMA) address **different telemetry ingestion needs** and are often **complementary**.

          **Azure Monitor Agent (AMA)** is designed for **direct, cloud-connected collection** from Azure and Arc-enabled resources. It's ideal when:

          - Resources can reliably connect to Azure
          - Telemetry volumes are moderate
          - You want simple, agent-based collection managed centrally in Azure

          **Azure Monitor pipeline** is designed for **edge, hybrid, and high-scale scenarios**. It's preferred when:

          - Telemetry originates outside Azure (on‑premises, edge, third‑party clouds)
          - Network connectivity is intermittent or restricted
          - You need local buffering, high-throughput ingestion, or pre-ingestion filtering and transformations
          - Clients can't send data directly to Azure Monitor

          In short: AMA uses an agent-based model, where each deployed agent collects telemetry from the same host or resource where it's installed and sends it to Azure Monitor. Azure Monitor pipeline uses a gateway-based model, where a centralized deployment can accept telemetry from remote sources anywhere that network connectivity is available. Many architectures use **both together**: AMA for Azure-connected resources that support agent-based collection, and Azure Monitor pipeline as a **central ingestion gateway** for remote, edge, and multicloud telemetry.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#azure-monitor-pipeline-compared-to-azure-monitor-agent)

      - question: Is Azure Monitor pipeline tied to a specific cloud provider?
        answer: |
          No. Azure Monitor pipeline is designed for hybrid and multicloud environments. It runs on Azure Arc–enabled Kubernetes clusters and leverages open-source OpenTelemetry technologies, enabling portability and interoperability across environments.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#supported-configurations)

  - name: Deployment & Architecture
    questions:
      - question: Where does Azure Monitor pipeline run?
        answer: |
          Azure Monitor pipeline runs as containerized components on an Azure Arc–enabled Kubernetes cluster. This enables deployment close to data sources in on‑premises data centers, edge locations, and other cloud environments.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#how-azure-monitor-pipeline-works)

      - question: Do I need to deploy Azure Monitor pipeline on every client resource?
        answer: |
          No. You don't deploy Azure Monitor pipeline on each client resource. You deploy Azure Monitor pipeline on an Azure Arc-enabled Kubernetes cluster and then configure your clients to send telemetry to the ports exposed by the pipeline instance. The pipeline acts as a centralized component that receives telemetry from multiple resources in your environment and forwards it to Azure Monitor.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#how-azure-monitor-pipeline-works)

      - question: What infrastructure is required to deploy Azure Monitor pipeline?
        answer: |
          Azure Monitor pipeline is designed to scale with your telemetry needs. You deploy it on an **Arc-enabled Kubernetes cluster**, and the size and configuration of the cluster depend on expected data volume, throughput, and resiliency requirements.

          Using Azure Monitor pipeline sizing guidance, you can start with a small footprint for modest ingestion needs and scale up predictably as volume grows.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-sizing)

      - question: Which Kubernetes distributions are supported?
        answer: |
          Azure Monitor pipeline supports multiple Kubernetes distributions when deployed through Azure Arc. Supported distributions and regions are documented and may change over time as support expands.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#supported-configurations)

  - name: Data Collection & Processing
    questions:
      - question: What types of data can Azure Monitor pipeline collect?
        answer: |
          Azure Monitor pipeline currently collects Syslog and OTLP logs (preview) from local or external clients.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#supported-data-sources)

      - question: Does Azure Monitor pipeline support data transformations?
        answer: |
          Yes. Azure Monitor pipeline supports local data transformations such as filtering, schematization, and aggregation. Applying transformations locally allows customers to control which telemetry is forwarded for centralized analysis.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-transformations)

      - question: How does Azure Monitor pipeline help reduce network usage?
        answer: |
          Azure Monitor pipeline compresses telemetry before sending it to the cloud. Network bandwidth is further reduced by filtering or aggregating the collected data. This is especially valuable in bandwidth-constrained or cost-sensitive environments.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-transformations)

  - name: Reliability, Scale & Connectivity
    questions:
      - question: How does Azure Monitor pipeline handle connectivity interruptions?
        answer: |
          If connectivity to Azure is unavailable, Azure Monitor pipeline buffers telemetry data locally in your configured persistent storage. Once connectivity is restored, buffered telemetry is backfilled to Azure Monitor, maintaining continuity of monitoring data.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#why-use-azure-monitor-pipeline)

  - name: Configuration & Management
    questions:
      - question: How is Azure Monitor pipeline configured?
        answer: |
          Azure Monitor pipeline can be configured using the Azure portal for a guided experience, or using CLI or ARM templates for advanced scenarios. This flexibility allows customers to choose the level of operational control that best fits their needs.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-configure)

      - question: Is Azure Monitor pipeline fully managed by Azure?
        answer: |
          Azure provides a centralized control plane to manage pipeline configuration and integration with Azure Monitor. The service also provides operational benefits such as out-of-band authentication from the pipeline to Log Analytics by using managed identity, the cert-manager extension for certificate management, automated certificate rotation, and zero-downtime TLS rotation. The customer is still responsible for operating and maintaining the environment where the pipeline runs. This shared responsibility model allows customers to retain control over their local infrastructure.

          [Learn more](/azure/azure-monitor/data-collection/pipeline-overview#how-azure-monitor-pipeline-works)
